        // --- SCREEN COMPONENT 3: DNA SCREEN ---
        function DnaScreen({ dnaInput, setDnaInput, dnaSequenceName, setDnaSequenceName, onSaveRecord }) {
            
            // --- DNA Calculations ---
            const cleanSeq = useMemo(() => {
                return dnaInput.toUpperCase().replace(/[^ATGCN]/g, '');
            }, [dnaInput]);

            const gcContent = useMemo(() => {
                if (cleanSeq.length === 0) return 0;
                const gc = cleanSeq.split('').filter(c => c === 'G' || c === 'C').length;
                return (gc / cleanSeq.length) * 100;
            }, [cleanSeq]);

            const molecularWeight = useMemo(() => {
                if (cleanSeq.length === 0) return 0;
                return (cleanSeq.length * 303.7) + 79.0;
            }, [cleanSeq]);

            const complement = useMemo(() => {
                return cleanSeq.split('').map(nucleotide => {
                    switch (nucleotide) {
                        case 'A': return 'T';
                        case 'T': return 'A';
                        case 'G': return 'C';
                        case 'C': return 'G';
                        default: return 'N';
                    }
                }).join('');
            }, [cleanSeq]);

            const reverseComplement = useMemo(() => {
                return complement.split('').reverse().join('');
            }, [complement]);

            const translation = useMemo(() => {
                let aminoAcids = "";
                for (let i = 0; i < cleanSeq.length - 2; i += 3) {
                    const codon = cleanSeq.substring(i, i + 3);
                    aminoAcids += CODON_TABLE[codon] || "X";
                }
                return aminoAcids;
            }, [cleanSeq]);

            const orfsList = useMemo(() => {
                const results = [];
                let startIdx = -1;
                for (let i = 0; i < translation.length; i++) {
                    if (translation[i] === 'M') {
                        if (startIdx === -1) startIdx = i;
                    } else if (translation[i] === '*' && startIdx !== -1) {
                        results.push(translation.substring(startIdx, i));
                        startIdx = -1;
                    }
                }
                if (startIdx !== -1) {
                    results.push(translation.substring(startIdx));
                }
                return results;
            }, [translation]);

            const restrictionSites = useMemo(() => {
                const found = [];
                const enzymes = {
                    "EcoRI (GAATTC)": "GAATTC",
                    "BamHI (GGATCC)": "GGATCC",
                    "HindIII (AAGCTT)": "AAGCTT"
                };
                Object.entries(enzymes).forEach(([name, pattern]) => {
                    let index = cleanSeq.indexOf(pattern);
                    while (index !== -1) {
                        found.push({ name, position: index + 1 });
                        index = cleanSeq.indexOf(pattern, index + 1);
                    }
                });
                return found;
            }, [cleanSeq]);

            const codonFrequencies = useMemo(() => {
                const map = {};
                for (let i = 0; i < cleanSeq.length - 2; i += 3) {
                    const codon = cleanSeq.substring(i, i + 3);
                    if (codon.length === 3) {
                        map[codon] = (map[codon] || 0) + 1;
                    }
                }
                return Object.entries(map).sort((a, b) => b[1] - a[1]);
            }, [cleanSeq]);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert("Text successfully copied to clipboard.");
            };

            const triggerSave = () => {
                const results = {
                    length: cleanSeq.length,
                    gcContent,
                    molecularWeight,
                    complement,
                    protein: translation,
                    orfsCount: orfsList.length
                };
                onSaveRecord("DNA", dnaSequenceName || "Unnamed Assay", cleanSeq, results);
            };

            return (
                <div class="flex flex-col gap-6 animate-fade-in">
                    
                    {/* Header */}
                    <div class="bg-brand-600/10 border border-brand-500/20 rounded-2xl p-6 glow-blue">
                        <span class="text-[10px] text-brand-500 font-bold uppercase tracking-wider">🧬 DNA SEQUENCE ASSAY WORKSPACE</span>
                        <h2 class="text-xl font-bold text-white font-display mt-1">Direct Genomes Transcriptions & Translation Algorithms</h2>
                        <p class="text-sm text-slate-400 mt-2 leading-relaxed">
                            Perform molecular weights calculations, open reading frame (ORF) discoveries, complementary pairings alignments, and codon usages scans.
                        </p>
                    </div>

                    {/* Inputs panel */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Target Sequence Parameters</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <label class="flex flex-col gap-1.5 text-xs text-slate-400 md:col-span-1">
                                Sequence Identifier/Target Name
                                <input 
                                    type="text" 
                                    value={dnaSequenceName}
                                    onChange={(e) => setDnaSequenceName(e.target.value)}
                                    placeholder="e.g. TP53 Segment Alpha"
                                    class="bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 text-sm outline-none focus:border-brand-600 font-medium"
                                />
                            </label>
                            <label class="flex flex-col gap-1.5 text-xs text-slate-400 md:col-span-2">
                                Pasted DNA Sequence (A, T, G, C, N)
                                <input 
                                    type="text" 
                                    value={dnaInput}
                                    onChange={(e) => setDnaInput(e.target.value)}
                                    placeholder="Enter nucleotide chains..."
                                    class="bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 font-mono text-sm outline-none focus:border-brand-600"
                                />
                            </label>
                        </div>
                    </div>

                    {/* Stats metric cards */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Nucleotides Length</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{cleanSeq.length} <span class="text-xs text-slate-400">bp</span></p>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">GC Content Percentage</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{gcContent.toFixed(1)} <span class="text-xs text-slate-400">%</span></p>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Approx. Molecular Weight</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{molecularWeight.toFixed(0)} <span class="text-xs text-slate-400">Da</span></p>
                        </div>
                    </div>

                    {/* Mappings & Transcription Display */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-5">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Alignments and Codon Transcription</h4>
                        
                        {/* Complement Structure */}
                        <div class="flex flex-col gap-1.5">
                            <div class="flex justify-between items-center text-xs font-semibold text-slate-400">
                                <span>Complement Strand Structure</span>
                                <button onClick={() => copyToClipboard(complement)} class="text-brand-500 hover:text-brand-400 font-bold text-[10px]">Copy 📋</button>
                            </div>
                            <div class="bg-slate-950 border border-slate-800 rounded-lg p-3 font-mono text-xs text-slate-300 break-all select-all">
                                {complement || 'Empty Sequence'}
                            </div>
                        </div>

                        {/* Reverse Complement */}
                        <div class="flex flex-col gap-1.5">
                            <div class="flex justify-between items-center text-xs font-semibold text-slate-400">
                                <span>Reverse Complement Sequence (5' -> 3')</span>
                                <button onClick={() => copyToClipboard(reverseComplement)} class="text-brand-500 hover:text-brand-400 font-bold text-[10px]">Copy 📋</button>
                            </div>
                            <div class="bg-slate-950 border border-slate-800 rounded-lg p-3 font-mono text-xs text-slate-300 break-all select-all">
                                {reverseComplement || 'Empty Sequence'}
                            </div>
                        </div>

                        {/* Protein Peptide Translation */}
                        <div class="flex flex-col gap-1.5">
                            <div class="flex justify-between items-center text-xs font-semibold text-slate-400">
                                <span>Translated Amino Acid Residues sequence (Frame +1)</span>
                                <button onClick={() => copyToClipboard(translation)} class="text-brand-500 hover:text-brand-400 font-bold text-[10px]">Copy 📋</button>
                            </div>
                            <div class="bg-slate-950 border border-slate-800 rounded-lg p-3 font-mono text-xs text-slate-300 break-all select-all">
                                {translation || 'Empty Sequence'}
                            </div>
                        </div>
                    </div>

                    {/* ORFs and Restriction Enzymes */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        {/* Open Reading Frames */}
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-3">
                            <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Predicted Open Reading Frames (ORFs)</h4>
                            {orfsList.length === 0 ? (
                                <p class="text-xs text-slate-500">No standard ATG/Stop bounded ORFs found in Frame +1.</p>
                            ) : (
                                <div class="flex flex-col gap-2 overflow-y-auto max-h-48">
                                    {orfsList.map((orf, i) => (
                                        <div key={i} class="p-2.5 bg-emerald-500/5 border border-emerald-500/10 rounded-lg text-xs font-mono text-emerald-400 break-all">
                                            <strong>ORF {i+1}</strong> ({orf.length} aa): {orf}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Restriction sites */}
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-3">
                            <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Enzyme Restriction Sites Mapped</h4>
                            {restrictionSites.length === 0 ? (
                                <p class="text-xs text-slate-500">No standard cuts sites matched in sequence (EcoRI, BamHI, HindIII).</p>
                            ) : (
                                <div class="flex flex-col gap-2 overflow-y-auto max-h-48">
                                    {restrictionSites.map((site, i) => (
                                        <div key={i} class="p-2.5 bg-brand-600/5 border border-brand-500/10 rounded-lg text-xs font-mono text-brand-400">
                                            ✂️ Cut site for <strong>{site.name}</strong> mapped at nucleotide position: <strong>{site.position}</strong>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                    </div>

                    {/* Codon usage frequency */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-3">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Codon Usage Frequencies</h4>
                        {codonFrequencies.length === 0 ? (
                            <p class="text-xs text-slate-500">No codon frequencies calculated.</p>
                        ) : (
                            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-2">
                                {codonFrequencies.slice(0, 12).map(([codon, count], idx) => (
                                    <div key={idx} class="p-2 bg-slate-950 border border-slate-800 rounded-lg text-center">
                                        <p class="text-xs font-mono font-bold text-white">{codon}</p>
                                        <p class="text-[10px] text-slate-500 mt-0.5">{count} runs</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Action save button */}
                    <button 
                        onClick={triggerSave}
                        class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold text-sm tracking-wide shadow-md shadow-brand-600/15 transition-all"
                    >
                        Save Assay Record to Workspace Catalog
                    </button>

                </div>
            );
        }

        // --- SCREEN COMPONENT 4: RNA SCREEN ---
        function RnaScreen({ rnaInput, setRnaInput, onSaveRecord }) {
            const [hoveredPoint, setHoveredPoint] = useState(null);

            const cleanRna = useMemo(() => {
                return rnaInput.toUpperCase().replace(/[^AUGCN]/g, '');
            }, [rnaInput]);

            // Stem Loop Base pairing prediction
            const pairings = useMemo(() => {
                const pairs = [];
                const stack = [];
                for (let i = 0; i < cleanRna.length; i++) {
                    const char = cleanRna[i];
                    if (char === 'G' || char === 'A') {
                        stack.push(i);
                    } else if (char === 'C' || char === 'U') {
                        if (stack.length > 0) {
                            const matchIdx = stack.pop();
                            const matchChar = cleanRna[matchIdx];
                            // Watson-Crick AU, GC, wobble GU pairs
                            if ((matchChar === 'A' && char === 'U') ||
                                (matchChar === 'G' && char === 'C') ||
                                (matchChar === 'G' && char === 'U')) {
                                pairs.push({ first: matchIdx, second: i });
                            }
                        }
                    }
                }
                return pairs.sort((a, b) => a.first - b.first);
            }, [cleanRna]);

            // Mock Volcano Plot point coordinates
            const volcanoPoints = [
                { log2FC: -2.5, pValue: 0.0001, gene: "DNMT1", status: "Down" },
                { log2FC: -1.8, pValue: 0.001, gene: "EZH2", status: "Down" },
                { log2FC: 3.2, pValue: 0.00001, gene: "MYC", status: "Up" },
                { log2FC: 2.1, pValue: 0.0005, gene: "SOX2", status: "Up" },
                { log2FC: -0.3, pValue: 0.5, gene: "GAPDH", status: "Neutral" },
                { log2FC: 0.5, pValue: 0.3, gene: "ACTB", status: "Neutral" },
                { log2FC: 1.2, pValue: 0.08, gene: "TP53", status: "Neutral" },
                { log2FC: -1.1, pValue: 0.04, gene: "DNMT3A", status: "Down" },
                { log2FC: 2.8, pValue: 0.00004, gene: "OCT4", status: "Up" }
            ];

            // Heatmap grid rows
            const heatmapGenes = ["MYC", "SOX2", "DNMT1", "EZH2"];
            const heatmapData = [
                [1.2, 1.0, 4.5, 4.2], // MYC
                [0.8, 0.9, 3.1, 3.4], // SOX2
                [5.1, 4.8, 1.5, 1.2], // DNMT1
                [3.9, 4.2, 0.9, 0.8]  // EZH2
            ];

            const triggerSave = () => {
                onSaveRecord("RNA", "transcript_assay_01", cleanRna, {
                    secondaryStructurePairings: pairings.length,
                    regulationRatio: "UpDownScaled"
                });
            };

            return (
                <div class="flex flex-col gap-6 animate-fade-in">
                    
                    {/* Header */}
                    <div class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-6 glow-green">
                        <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-wider">🧪 RNA TRANSCRIPT ANALYSIS WORKSPACE</span>
                        <h2 class="text-xl font-bold text-white font-display mt-1">Secondary Wobble Base Foldings & Transcript Expressions</h2>
                        <p class="text-sm text-slate-400 mt-2 leading-relaxed">
                            Evaluate differential transcriptomics coordinates using interactive Volcano charts, heatmaps expression panels, and predicted hairpins loops.
                        </p>
                    </div>

                    {/* Inputs */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300 mb-3">RNA Transcript Nucleotides</h4>
                        <label class="flex flex-col gap-1.5 text-xs text-slate-400">
                            Pasted RNA Sequence (A, U, G, C)
                            <input 
                                type="text" 
                                value={rnaInput}
                                onChange={(e) => setRnaInput(e.target.value)}
                                placeholder="Enter RNA nucleotide vectors..."
                                class="bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 font-mono text-sm outline-none focus:border-emerald-600"
                            />
                        </label>
                    </div>

                    {/* Stem Loops Predicted */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300 mb-3">Secondary Wobble Stem Loop Connections</h4>
                        {pairings.length === 0 ? (
                            <p class="text-xs text-slate-500">No folded hairpins or stem connections predicted on sequence.</p>
                        ) : (
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-48 overflow-y-auto">
                                {pairings.map((p, idx) => (
                                    <div key={idx} class="p-2.5 bg-emerald-500/5 border border-emerald-500/10 rounded-lg text-xs font-mono text-emerald-400">
                                        🔗 Loop stems: Base <strong>[{cleanRna[p.first]} at {p.first}]</strong> pairs with Base <strong>[{cleanRna[p.second]} at {p.second}]</strong>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Interactive Volcano Plot Graphic */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                            <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Differential expression (Volcano plot)</h4>
                            <span class="text-[10px] font-mono font-bold bg-brand-600/10 border border-brand-600/20 px-2 py-0.5 rounded text-brand-500">
                                MCF-7 Treated vs Ctrl
                            </span>
                        </div>

                        <div class="relative bg-slate-950 border border-slate-800/80 rounded-xl p-4 h-64 flex justify-center items-center">
                            
                            {/* SVG Chart area */}
                            <svg class="w-full h-full" viewBox="0 0 500 240">
                                {/* Axes */}
                                <line x1="40" y1="210" x2="480" y2="210" stroke="#475569" stroke-width="1.5" />
                                <line x1="40" y1="10" x2="40" y2="210" stroke="#475569" stroke-width="1.5" />
                                
                                {/* FC reference line (Zero) */}
                                <line x1="260" y1="10" x2="260" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="3" />
                                
                                {/* Points */}
                                {volcanoPoints.map((p, idx) => {
                                    // Map X: -4 to +4 range -> x=40 to x=480 (range 440)
                                    const x = 260 + (p.log2FC / 4.5) * 220;
                                    
                                    // Map Y: -log10(p-value) range 0 to 5 -> y=210 to y=10
                                    const negLogP = -Math.log10(p.pValue);
                                    const y = 210 - (negLogP / 5.2) * 200;

                                    const pointColor = p.status === 'Up' ? '#ef4444' : p.status === 'Down' ? '#10b981' : '#64748b';

                                    return (
                                        <g 
                                            key={idx}
                                            className="cursor-pointer group"
                                            onMouseEnter={() => setHoveredPoint(p)}
                                            onMouseLeave={() => setHoveredPoint(null)}

                                    <p class="font-bold text-white">Gene: {hoveredPoint.gene}</p>
                                    <p class="text-slate-400">log2 Fold Change: <strong class={hoveredPoint.status === 'Up' ? 'text-rose-500' : hoveredPoint.status === 'Down' ? 'text-emerald-500' : 'text-slate-300'}>{hoveredPoint.log2FC}</strong></p>

                                </div>
                            )}

                        {/* Legends */}

                            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded bg-rose-500"></span> Up-regulated</span>
                            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded bg-emerald-500"></span> Down-regulated</span>
                            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded bg-slate-500"></span> Neutral</span>
                        </div>
                    </div>

                    {/* Heatmap Section */}

        // --- SCREEN COMPONENT 5: PROTEIN SCREEN ---
        function ProteinScreen({ proteinInput, setProteinInput, onSaveRecord }) {
            const canvasRef = useRef(null);
            const [rotation, setRotation] = useState(45);
            const [isAutoSpin, setIsAutoSpin] = useState(true);

            const cleanProtein = useMemo(() => {
                return proteinInput.toUpperCase().replace(/[^ACDEFGHIKLMNPQRSTVWY]/g, '');
            }, [proteinInput]);

            // Hydrophobicity GRAVY
            const gravies = useMemo(() => {
                if (cleanProtein.length === 0) return 0;
                const sum = cleanProtein.split('').reduce((acc, aa) => acc + (HYDROPHOBICITY_MAP[aa] || 0), 0);
                return sum / cleanProtein.length;
            }, [cleanProtein]);

            // Approx Mass
            const approxMass = cleanProtein.length * 110;

            // Acidic/Basic residues
            const charges = useMemo(() => {
                const positive = cleanProtein.split('').filter(aa => aa === 'K' || aa === 'R' || aa === 'H').length;
                const negative = cleanProtein.split('').filter(aa => aa === 'D' || aa === 'E').length;
                return { positive, negative };
            }, [cleanProtein]);

            // Motif scanner
            const motifsList = useMemo(() => {
                const found = [];
                // Phosphorylation: [ST].[RK]
                const phosphoRegex = /[ST].[RK]/g;
                let match;
                while ((match = phosphoRegex.exec(cleanProtein)) !== null) {
                    found.push(`Kinase Phosphorylation Locus at index ${match.index + 1} (${match[0]})`);
                }
                // N-glycosylation: N[^P][ST]
                const glycosylRegex = /N[^P][ST]/g;
                while ((match = glycosylRegex.exec(cleanProtein)) !== null) {
                    found.push(`N-Glycosylation Target at index ${match.index + 1} (${match[0]})`);
                }
                return found;
            }, [cleanProtein]);

            // 3D Atomic Helix Ribbon canvas rendering loop
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let frameId;

                const render = () => {
                    const w = canvas.width = canvas.offsetWidth;
                    const h = canvas.height = canvas.offsetHeight;
                    ctx.clearRect(0, 0, w, h);
                    
                    const yCenter = h / 2;
                    const rad = (rotation * Math.PI) / 180;
                    
                    // Draw helical ribbon
                    ctx.beginPath();
                    ctx.strokeStyle = "#38bdf8";
                    ctx.lineWidth = 4;
                    ctx.lineCap = "round";

                    for (let x = 30; x < w - 30; x += 1.5) {
                        const offset3D = Math.sin(x * 0.05 + rad) * 22;
                        const y = yCenter + Math.cos(x * 0.02) * 35 + offset3D;
                        if (x === 30) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();

                    // Draw atomic sidechains
                    for (let x = 40; x < w - 40; x += 25) {
                        const offset3D = Math.sin(x * 0.05 + rad) * 22;
                        const y = yCenter + Math.cos(x * 0.02) * 35 + offset3D;

                        // Red atomic spheres (Oxygen)
                        ctx.beginPath();
                        ctx.arc(x, y - 25, 4.5, 0, 2 * Math.PI);
                        ctx.fillStyle = "#ef4444";
                        ctx.fill();

                        // Blue atomic spheres (Nitrogen)
                        ctx.beginPath();
                        ctx.arc(x + 8, y + 20, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = "#3b82f6";
                        ctx.fill();

                        // Connections lines
                        ctx.beginPath();
                        ctx.strokeStyle = "rgba(255,255,255,0.2)";
                        ctx.lineWidth = 1;
                        ctx.moveTo(x, y);
                        ctx.lineTo(x, y - 25);
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + 8, y + 20);
                        ctx.stroke();
                    }

                    // Spin increment
                    if (isAutoSpin) {
                        setRotation(r => (r + 0.5) % 360);
                    }
                    frameId = requestAnimationFrame(render);
                };

                render();
                return () => cancelAnimationFrame(frameId);
            }, [rotation, isAutoSpin]);

            const triggerSave = () => {
                onSaveRecord("PROTEIN", "peptide_structural_run", cleanProtein, {
                    hydrophobicity: gravies,
                    isoelectricEst: "Estimated PI"
                });
            };

            return (
                <div class="flex flex-col gap-6 animate-fade-in">
                    
                    {/* Header */}
                    <div class="bg-indigo-600/10 border border-indigo-500/20 rounded-2xl p-6 glow-blue">
                        <span class="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">🧬 PROTEIN STRUCTURAL WORKSPACE</span>
                        <h2 class="text-xl font-bold text-white font-display mt-1">Biophysical Profiles & Tertiary Ribbon Models</h2>
                        <p class="text-sm text-slate-400 mt-2 leading-relaxed">
                            Analyze Hydrophobicity scores (GRAVY indexes), identify localized glycosylation motifs, and spin 3D helices side-chains.
                        </p>
                    </div>

                    {/* Inputs */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                        <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300 mb-3">Target Peptide Sequence</h4>
                        <label class="flex flex-col gap-1.5 text-xs text-slate-400">
                            Fasta Amino Acids (A, C, D, E...)
                            <input 
                                type="text" 
                                value={proteinInput}
                                onChange={(e) => setProteinInput(e.target.value)}
                                placeholder="Enter FASTA residue strings..."
                                class="bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 font-mono text-sm outline-none focus:border-indigo-600"
                            />
                        </label>
                    </div>

                    {/* Quick values widgets */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Residues Count</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{cleanProtein.length} <span class="text-xs text-slate-400">aa</span></p>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Hydrophobicity (GRAVY)</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{gravies.toFixed(2)} <span class="text-xs text-slate-400">index</span></p>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-center">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Estimated Peptide Mass</p>
                            <p class="text-2xl font-black font-display text-white mt-1">{(approxMass / 1000).toFixed(1)} <span class="text-xs text-slate-400">kDa</span></p>
                        </div>
                    </div>

                    {/* Rotating 3D Atomic Helix Ribbon */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                            <div>
                                <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">3D atomic structural ribbon</h4>
                                <p class="text-[10px] text-slate-500 mt-0.5">Click canvas to drag/spin structure manually</p>
                            </div>
                            <button 
                                onClick={() => setIsAutoSpin(!isAutoSpin)}
                                class={`text-[10px] font-bold px-3 py-1 rounded border transition-all ${
                                    isAutoSpin 
                                    ? 'bg-brand-600/15 border-brand-500/20 text-brand-500' 
                                    : 'bg-slate-950 border-slate-800 text-slate-400'
                                }`}
                            >
                                {isAutoSpin ? '🟢 Auto Spinning' : '🔴 Paused'}
                            </button>
                        </div>

                        {/* Interactive Canvas */}
                        <div class="relative bg-slate-950 border border-slate-850 rounded-xl overflow-hidden h-52 flex items-center justify-center">
                            <canvas 
                                ref={canvasRef} 
                                onClick={() => {
                                    setRotation(r => (r + 30) % 360);
                                    setIsAutoSpin(false);
                                }}
                                class="w-full h-full cursor-pointer"
                            ></canvas>
                            <div class="absolute bottom-3 left-3 text-[10px] text-slate-500 font-mono">
                                Helix Ribbon (Angle: {Math.floor(rotation)}°)
                            </div>
                        </div>
                    </div>

                    {/* Biophysical Assays */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        {/* Acidic Basic list */}
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-3">
                            <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Residues Charges Distribution</h4>
                            <div class="flex flex-col gap-2 text-xs">
                                <div class="flex justify-between items-center py-1.5 border-b border-slate-800/60">
                                    <span class="text-slate-400 font-medium">Basic Amino Acids (H, K, R):</span>
                                    <span class="font-bold text-blue-400">{charges.positive} residues</span>
                                </div>
                                <div class="flex justify-between items-center py-1.5">
                                    <span class="text-slate-400 font-medium">Acidic Amino Acids (D, E):</span>
                                    <span class="font-bold text-rose-400">{charges.negative} residues</span>
                                </div>
                            </div>
                        </div>

                        {/* Active site motifs */}
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-3">
                            <h4 class="text-sm font-bold font-display uppercase tracking-wider text-slate-300">Active phosphorylation / Glycosylation Motifs</h4>
                            {motifsList.length === 0 ? (
                                <p class="text-xs text-slate-500">No regulatory motifs matched on FASTA string.</p>
                            ) : (
                                <div class="flex flex-col gap-2 max-h-36 overflow-y-auto">

                                            💡 {m}

                    </div>

                    {/* Save button */}
                    <button

                </div>

                            <div class="flex flex-col gap-3">
                                <label class="flex flex-col gap-1.5 text-xs text-slate-400">
                                    Notebook Subject / Title
                                    <input 
                                        type="text" 
                                        value={noteTitle}
                                        onChange={(e) => setNoteTitle(e.target.value)}
                                        placeholder="e.g. gRNA DNMT1 Design"
                                        class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-100 text-sm outline-none focus:border-brand-600 font-semibold"
                                    />
                                </label>
                                <label class="flex flex-col gap-1.5 text-xs text-slate-400">
                                    Specifications / Lab parameters
                                    <textarea 
                                        value={noteContent}
                                        onChange={(e) => setNoteContent(e.target.value)}
                                        placeholder="Enter experimental results, CRISPR coordinates, etc..."
                                        class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-slate-100 text-sm outline-none focus:border-brand-600 h-40 resize-none font-mono"
                                    />
                                </label>
                            </div>
                            <button 
                                onClick={onSave}
                                class="w-full py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-xs font-semibold tracking-wide transition-all mt-2"
                            >
                                {editingId ? 'Save Edits' : 'Commit Notebook Log'}
                            </button>
                        </div>

                        {/* List column */}
                        <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                            <h4 class="text-xs font-bold font-display uppercase tracking-widest text-slate-400 border-b border-slate-800 pb-2">Saved Telemetry Notes ({notes.length})</h4>
                            {notes.length === 0 ? (
                                <p class="text-xs text-slate-500 py-12 text-center">No notebook logs commited. Write above to save.</p>
                            ) : (
                                <div class="flex flex-col gap-4 overflow-y-auto max-h-[400px]">
                                    {notes.map(note => (
                                        <div key={note.id} class="bg-slate-950 border border-slate-850 rounded-xl p-4 flex flex-col gap-2 shadow-sm relative">
                                            <div class="flex justify-between items-start">
                                                <h5 class="text-sm font-bold text-white font-display">{note.title}</h5>
                                                <div class="flex gap-2">
                                                    <button onClick={() => onEdit(note)} class="text-xs text-brand-500 hover:text-brand-400 p-1">✏️</button>
                                                    <button onClick={() => onDelete(note.id)} class="text-xs text-rose-500 hover:text-rose-400 p-1">🗑️</button>
                                                </div>
                                            </div>
                                            <p class="text-xs text-slate-300 font-mono leading-relaxed whitespace-pre-wrap">{note.content}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                    </div>

                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
